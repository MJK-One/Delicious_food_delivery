services:

  postgres:
    image: '${POSTGRESQL_IMAGE}'
    ports:
      - '${POSTGRESQL_PORT}'
    restart: always
    volumes:
      - ./postgres_prod_data:/var/lib/postgresql
    environment:
      - 'POSTGRES_DB=${DB}'
      - 'POSTGRES_USER=${DB_USER}'
      - 'POSTGRES_PASSWORD=${DB_PW}'

  redis:
    image: '${REDIS_IMAGE}'
    restart: always
    command: redis-server --appendonly yes --notify-keyspace-events Ex
    volumes:
      - ./redis_prod_data:/data

  api-server:
    image: '${SERVER_IMAGE}'
    restart: always
    ports:
      - '${SERVER_PORT}'
    environment:
      - SPRING_DATASOURCE_URL=${DB_URL}
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PW}
      - SPRING_DATA_REDIS_HOST=${REDIS_HOST}
      - SPRING_DATA_REDIS_PORT=${REDIS_PORT}
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT=org.hibernate.dialect.PostgreSQLDialect
      - JWT_SECRET=${JWT_SECRET}
      - SLACK_API_KEY=${SLACK_API_KEY}
      - SPRING_PROFILES_ACTIVE=prod
      - AI_GEMINI_MODEL=gemini-3.1-flash-lite-preview
      - AI_GEMINI_IMAGE_MODEL=imagen-4.0-fast-generate-001
      - AI_GEMINI_BASE_URL=https://generativelanguage.googleapis.com
    depends_on:
      - postgres
      - redis