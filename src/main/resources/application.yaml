spring:
  application:
    name: Delicious Food Delivery

ai:
  gemini:
    api-key: ${GEMINI_API_KEY}
    model: gemini-3.1-flash-lite-preview
    base-url: https://generativelanguage.googleapis.com

springdoc:
  swagger-ui:
    path: /swagger
    tags-sorter: alpha
    operations-sorter: method
    groups-order: DESC
    doc-expansion: none
    default-model-expand-depth: 1
  api-docs:
    path: /api-docs