name: Auto_Deploy

on:
  push:
    branches: [ "cd/dev" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      # 1. 자바 21 환경 설정 (빌드를 위해 필요)
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      # 2. 최신 소스코드로 JAR 파일 빌드 (clean으로 찌꺼기 제거)
      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew clean build -x test

      # 3. Docker Hub 로그인
      - name: Docker_Hub Login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 4. 도커 이미지 빌드 및 푸시
      # (이 단계에서 Dockerfile이 실행되며, 위에서 만든 JAR를 이미지에 넣습니다)
      - name: Build and Push Docker_Image
        run: |
          docker build -t ${{ secrets.SERVER_IMAGE }} .
          docker push ${{ secrets.SERVER_IMAGE }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # 5. 수정된 compose.dev.yaml을 EC2로 복사
      - name: Copy compose.dev.yaml to EC2
        uses: appleboy/scp-action@v0.1.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          source: "compose.dev.yaml"
          target: "/home/${{ secrets.USERNAME }}"

      # 6. EC2에서 최신 이미지 pull 및 컨테이너 실행
      - name: SSH Remote Commands
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          script: |
            cd /home/${{ secrets.USERNAME }}
            
            export POSTGRESQL_IMAGE=${{ secrets.POSTGRESQL_IMAGE }}
            export REDIS_IMAGE=${{ secrets.REDIS_IMAGE }}
            export SERVER_IMAGE=${{ secrets.SERVER_IMAGE }}
            export DB=${{ secrets.DB }}
            export DB_USER=${{ secrets.DB_USER }}
            export DB_PW=${{ secrets.DB_PW }}
            export DB_URL=${{ secrets.DB_URL }}
            export REDIS_PORT=${{ secrets.REDIS_PORT }}
            export REDIS_HOST=${{ secrets.REDIS_HOST }}
            export SERVER_PORT=${{ secrets.SERVER_PORT }}
            export JWT_SECRET=${{ secrets.JWT_SECRET }}
            
            if [ "${{ github.ref }}" == "refs/heads/cd/dev" ]; then
              COMPOSE_FILE="compose.dev.yaml"
            else
              COMPOSE_FILE="compose.prod.yaml"
            fi
            
            # 기존 컨테이너 종료 후 새 이미지 반영
            docker compose -f compose.dev.yaml down || true
            docker compose -f compose.prod.yaml down || true
            
            docker compose -f ${COMPOSE_FILE} pull
            docker compose -f ${COMPOSE_FILE} up -d
            
            docker image prune -f