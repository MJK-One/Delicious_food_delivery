name: Auto_Deploy

on:
  push:
    branches: [ "develop" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew clean build -x test

      # Docker Hub 로그인
      - name: Docker_Hub Login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker_Image
        run: |
          docker build -t ${{ secrets.SERVER_IMAGE }} .
          docker push ${{ secrets.SERVER_IMAGE }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # compose.prod.yaml → EC2 복사
      - name: Copy compose.prod.yaml to EC2
        if: github.ref == 'refs/heads/develop'
        uses: appleboy/scp-action@v0.1.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.PROD_KEY }}
          source: "compose.prod.yaml"
          target: "/home/${{ secrets.USERNAME }}"

      # compose.dev.yaml → EC2 복사
      - name: Copy compose.dev.yaml to EC2
        if: github.ref == 'refs/heads/develop'
        uses: appleboy/scp-action@v0.1.3
        with:
            host: ${{ secrets.PROD_HOST }}
            username: ${{ secrets.USERNAME }}
            key: ${{ secrets.PROD_KEY }}
            source: "compose.dev.yaml"
            target: "/home/${{ secrets.USERNAME }}"

      # EC2 PROD server
      - name: SSH Remote Commands
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.PROD_KEY }}
          script: |
            cd /home/${{ secrets.USERNAME }}
            
            export POSTGRESQL_IMAGE=${{ secrets.POSTGRESQL_IMAGE }}
            export REDIS_IMAGE=${{ secrets.REDIS_IMAGE }}
            export SERVER_IMAGE=${{ secrets.SERVER_IMAGE }}
            export DB=${{ secrets.DB }}
            export POSTGRESQL_PORT=${{ secrets.POSTGRESQL_PORT }}
            export DB_USER=${{ secrets.DB_USER }}
            export DB_PW=${{ secrets.DB_PW }}
            export DB_URL=${{ secrets.DB_URL }}
            export REDIS_PORT=${{ secrets.REDIS_PORT }}
            export REDIS_HOST=${{ secrets.REDIS_HOST }}
            export SERVER_PORT=${{ secrets.SERVER_PORT }}
            export JWT_SECRET=${{ secrets.JWT_SECRET }}
            export GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            export SLACK_API_KEY=${{ secrets.SLACK_API_KEY }}
            
            docker-compose -f compose.prod.yaml down || true
            docker-compose -f compose.prod.yaml pull
            docker-compose -f compose.prod.yaml up -d
            docker image prune -f            

      # EC2 Dev server
      - name: SSH Remote Commands
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          script: |
              cd /home/${{ secrets.USERNAME }}
                    
              export POSTGRESQL_IMAGE=${{ secrets.POSTGRESQL_IMAGE }}
              export REDIS_IMAGE=${{ secrets.REDIS_IMAGE }}
              export SERVER_IMAGE=${{ secrets.SERVER_IMAGE }}
              export DB=${{ secrets.DB }}
              export POSTGRESQL_PORT=${{ secrets.POSTGRESQL_PORT }}
              export DB_USER=${{ secrets.DB_USER }}
              export DB_PW=${{ secrets.DB_PW }}
              export DB_URL=${{ secrets.DB_URL }}
              export REDIS_PORT=${{ secrets.REDIS_PORT }}
              export REDIS_HOST=${{ secrets.REDIS_HOST }}
              export SERVER_PORT=${{ secrets.SERVER_PORT }}
              export JWT_SECRET=${{ secrets.JWT_SECRET }}
              export GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
              export SLACK_API_KEY=${{ secrets.SLACK_API_KEY }}
                    
              docker-compose -f compose.dev.yaml down || true
              docker-compose -f compose.dev.yaml pull
              docker-compose -f compose.dev.yaml up -d  
              docker image prune -f